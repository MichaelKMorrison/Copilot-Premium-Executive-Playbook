<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Copilot Briefing — An Executive Course</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F4F1E8;
    --paper-card:#FBF9F3;
    --ink:#1C2333;
    --ink-soft:#4A5066;
    --navy:#1F2A44;
    --navy-light:#2E3B5C;
    --brass:#A9824C;
    --brass-dark:#7C5E33;
    --brass-light:#E9DCC3;
    --line:#DAD3BF;
    --forest:#3F6B4A;
    --forest-light:#E4EBE3;
    --rust:#9B4A3A;
    --rust-light:#F1E1DC;
    --radius:10px;
    --shadow: 0 1px 2px rgba(28,35,51,0.06), 0 4px 16px rgba(28,35,51,0.06);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  h1,h2,h3,.serif{font-family:'Newsreader',serif;}
  .mono{font-family:'IBM Plex Mono',monospace;}

  ::selection{background:var(--brass-light);}

  a{color:var(--brass-dark);}

  button{font-family:inherit;cursor:pointer;}

  /* ---------- App shell ---------- */
  .app-shell{
    display:grid;
    grid-template-columns:280px 1fr;
    max-width:1180px;
    margin:0 auto;
    min-height:100vh;
  }
  @media (max-width:860px){
    .app-shell{grid-template-columns:1fr;}
    .sidebar{position:static;order:2;border-right:none;border-top:1px solid var(--line);}
    .main{order:1;}
  }

  /* ---------- Sidebar ---------- */
  .sidebar{
    background:var(--navy);
    color:#EDE8DA;
    padding:28px 20px 40px;
    position:sticky;
    top:0;
    align-self:start;
    height:100vh;
    overflow-y:auto;
    border-right:1px solid var(--line);
  }
  @media (max-width:860px){ .sidebar{ height:auto; position:static; } }

  .brand{
    display:flex;
    align-items:baseline;
    gap:8px;
    margin-bottom:4px;
  }
  .brand-mark{
    width:26px;height:26px;border-radius:50%;
    border:1.5px solid var(--brass);
    display:flex;align-items:center;justify-content:center;
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;color:var(--brass);
    flex:none;
  }
  .brand-name{font-size:14px;font-weight:500;letter-spacing:0.02em;color:#EDE8DA;}
  .brand-sub{font-size:11px;color:#9FA6BD;margin:2px 0 22px 34px;letter-spacing:0.04em;text-transform:uppercase;}

  .progress-block{margin-bottom:26px;}
  .progress-label{
    display:flex;justify-content:space-between;
    font-size:11px;color:#9FA6BD;margin-bottom:6px;
    font-family:'IBM Plex Mono',monospace;
  }
  .progress-track{
    height:4px;background:rgba(255,255,255,0.12);border-radius:2px;overflow:hidden;
  }
  .progress-fill{
    height:100%;background:var(--brass);border-radius:2px;
    transition:width .4s ease;
  }

  .nav-list{list-style:none;margin:0;padding:0;}
  .nav-item{margin-bottom:2px;}
  .nav-btn{
    width:100%;
    display:flex;align-items:center;gap:10px;
    background:none;border:none;
    color:#C9CEDE;
    text-align:left;
    padding:9px 8px;
    border-radius:6px;
    font-size:13.5px;
    line-height:1.35;
  }
  .nav-btn:hover{background:rgba(255,255,255,0.06);color:#fff;}
  .nav-btn.active{background:rgba(169,130,76,0.18);color:#fff;}
  .nav-num{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;color:#7C87A6;
    width:18px;flex:none;
  }
  .nav-btn.active .nav-num{color:var(--brass);}
  .nav-stamp{
    margin-left:auto;flex:none;
    width:16px;height:16px;
    border-radius:50%;
    border:1.3px solid var(--forest);
    color:var(--forest);
    display:none;
    align-items:center;justify-content:center;
    font-size:10px;
  }
  .nav-item.done .nav-stamp{display:flex;background:rgba(63,107,74,0.15);}

  .sidebar-foot{
    margin-top:28px;padding-top:18px;border-top:1px solid rgba(255,255,255,0.1);
    font-size:11.5px;color:#8992AC;line-height:1.6;
  }

  /* ---------- Main ---------- */
  .main{padding:44px 56px 90px;}
  @media (max-width:860px){ .main{padding:32px 22px 70px;} }

  /* Cover */
  .cover{max-width:640px;}
  .cover-eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:11.5px;letter-spacing:0.12em;text-transform:uppercase;
    color:var(--brass-dark);margin-bottom:18px;
  }
  .cover h1{font-size:44px;font-weight:500;line-height:1.12;margin:0 0 16px;}
  .cover .lede{font-size:17px;color:var(--ink-soft);line-height:1.65;margin:0 0 30px;}
  .cover .attrib{
    font-size:13px;color:var(--ink-soft);border-top:1px solid var(--line);
    padding-top:16px;margin-bottom:34px;
  }
  .begin-btn{
    background:var(--navy);color:#fff;border:none;
    padding:13px 26px;border-radius:6px;
    font-size:14.5px;font-weight:500;
    display:inline-flex;align-items:center;gap:8px;
  }
  .begin-btn:hover{background:var(--navy-light);}

  .cover-grid{
    display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:44px;
  }
  @media (max-width:600px){ .cover-grid{grid-template-columns:1fr;} }
  .cover-card{
    border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;
    background:var(--paper-card);
  }
  .cover-card .n{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--brass-dark);}
  .cover-card p{font-size:13px;margin:6px 0 0;color:var(--ink-soft);line-height:1.5;}

  /* Module header */
  .mod-eyebrow{
    font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:0.1em;
    text-transform:uppercase;color:var(--brass-dark);margin-bottom:10px;
    display:flex;align-items:center;gap:10px;
  }
  .mod-header h2{font-size:32px;font-weight:500;margin:0 0 12px;line-height:1.18;}
  .mod-dek{font-size:16px;color:var(--ink-soft);line-height:1.7;max-width:620px;margin:0 0 30px;}

  .mod-body{max-width:640px;}
  .mod-body p{font-size:15.5px;line-height:1.75;color:var(--ink);margin:0 0 16px;}
  .mod-body ul{padding-left:20px;margin:0 0 16px;}
  .mod-body li{font-size:15.5px;line-height:1.7;margin-bottom:8px;color:var(--ink);}
  .mod-body strong{font-weight:600;}

  /* Callout cards */
  .card{
    background:var(--paper-card);border:1px solid var(--line);border-radius:var(--radius);
    padding:18px 20px;margin:0 0 16px;
  }
  .card h3{font-size:15px;font-weight:600;font-family:'Inter';margin:0 0 6px;}
  .card p{margin:0;font-size:14.5px;color:var(--ink-soft);}

  .fact-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:0 0 22px;}
  @media (max-width:600px){ .fact-grid{grid-template-columns:1fr;} }

  /* Prompt box */
  .prompt-box{
    background:var(--navy);color:#F0EDE2;
    border-radius:var(--radius);padding:16px 18px;margin:0 0 14px;
    position:relative;
  }
  .prompt-box .label{
    font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--brass);
    text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px;display:block;
  }
  .prompt-box p{
    font-family:'Newsreader',serif;font-style:italic;font-size:15.5px;
    line-height:1.6;margin:0;padding-right:76px;color:#F0EDE2;
  }
  .copy-btn{
    position:absolute;top:14px;right:14px;
    background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.18);
    color:#EDE8DA;font-size:11.5px;padding:6px 11px;border-radius:5px;
  }
  .copy-btn:hover{background:rgba(255,255,255,0.16);}
  .copy-btn.copied{background:var(--forest);border-color:var(--forest);color:#fff;}

  /* Timeline (30 days) */
  .timeline{border-left:2px solid var(--line);padding-left:22px;margin:8px 0 22px;}
  .tl-item{margin-bottom:22px;position:relative;}
  .tl-item::before{
    content:'';position:absolute;left:-27.5px;top:4px;
    width:9px;height:9px;border-radius:50%;background:var(--brass);
    border:2px solid var(--paper);
  }
  .tl-week{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--brass-dark);text-transform:uppercase;letter-spacing:0.06em;}
  .tl-item h4{font-size:16px;margin:4px 0 4px;font-weight:600;font-family:'Inter';}
  .tl-item p{font-size:14.5px;color:var(--ink-soft);margin:0;line-height:1.6;}

  /* App sub-cards for module 7 */
  .app-cards{display:flex;flex-direction:column;gap:14px;margin:0 0 20px;}
  .app-card{border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;background:var(--paper-card);}
  .app-card h4{margin:0 0 6px;font-size:15.5px;font-weight:600;font-family:'Inter';}
  .app-card p{margin:0 0 12px;font-size:14px;color:var(--ink-soft);line-height:1.6;}

  /* Formula builder */
  .builder{border:1px solid var(--line);border-radius:var(--radius);background:var(--paper-card);padding:20px;margin:0 0 20px;}
  .builder-row{margin-bottom:12px;}
  .builder-row label{
    display:block;font-family:'IBM Plex Mono',monospace;font-size:11px;
    text-transform:uppercase;letter-spacing:0.06em;color:var(--brass-dark);margin-bottom:5px;
  }
  .builder-row input{
    width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:6px;
    font-size:14px;font-family:'Inter';background:#fff;color:var(--ink);
  }
  .builder-row input:focus{outline:2px solid var(--brass-light);border-color:var(--brass);}
  .builder-preview{
    margin-top:14px;background:var(--navy);color:#F0EDE2;border-radius:8px;padding:14px 16px;
    font-family:'Newsreader',serif;font-style:italic;font-size:15px;line-height:1.6;min-height:22px;
  }

  /* Quick check */
  .quiz{border:1px solid var(--brass-light);background:#FEFBF3;border-radius:var(--radius);padding:18px 20px;margin:8px 0 24px;}
  .quiz .qhead{
    display:flex;align-items:center;gap:8px;margin-bottom:12px;
    font-family:'IBM Plex Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;
    color:var(--brass-dark);
  }
  .quiz .qtext{font-size:15px;font-weight:500;margin:0 0 12px;}
  .qopt{
    display:block;width:100%;text-align:left;
    border:1px solid var(--line);background:#fff;border-radius:7px;
    padding:10px 13px;margin-bottom:8px;font-size:14px;color:var(--ink);
  }
  .qopt:hover{border-color:var(--brass);}
  .qopt.correct{border-color:var(--forest);background:var(--forest-light);color:#25452F;}
  .qopt.wrong{border-color:var(--rust);background:var(--rust-light);color:#6E2E22;}
  .qopt:disabled{cursor:default;}
  .qexplain{font-size:13.5px;color:var(--ink-soft);margin-top:8px;line-height:1.6;display:none;}
  .qexplain.show{display:block;}

  /* Footer nav */
  .mod-footer{
    display:flex;justify-content:space-between;align-items:center;
    margin-top:36px;padding-top:22px;border-top:1px solid var(--line);
    max-width:640px;
  }
  .foot-nav{display:flex;gap:10px;}
  .btn{
    border:1px solid var(--line);background:var(--paper-card);color:var(--ink);
    padding:9px 16px;border-radius:6px;font-size:13.5px;font-weight:500;
  }
  .btn:hover{border-color:var(--ink-soft);}
  .btn:disabled{opacity:0.35;cursor:default;}
  .btn:disabled:hover{border-color:var(--line);}
  .btn-complete{
    background:var(--forest);color:#fff;border-color:var(--forest);
    display:flex;align-items:center;gap:7px;
  }
  .btn-complete:hover{background:#345A3D;}
  .btn-complete.is-done{background:var(--paper-card);color:var(--forest);border-color:var(--forest);}

  .stamp-mark{
    width:15px;height:15px;border:1.5px solid currentColor;border-radius:50%;
    display:inline-flex;align-items:center;justify-content:center;font-size:10px;
  }

  /* Completion view */
  .completion{max-width:600px;text-align:left;}
  .seal{
    width:78px;height:78px;border-radius:50%;border:2px solid var(--brass);
    display:flex;align-items:center;justify-content:center;
    font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--brass-dark);
    text-align:center;line-height:1.3;letter-spacing:0.04em;text-transform:uppercase;
    margin-bottom:22px;
  }
  .resource-list{list-style:none;padding:0;margin:18px 0 0;}
  .resource-list li{
    display:flex;justify-content:space-between;gap:12px;
    padding:10px 0;border-bottom:1px solid var(--line);font-size:14px;
  }
  .resource-list li span:first-child{color:var(--ink);}
  .resource-list li span:last-child{color:var(--ink-soft);font-family:'IBM Plex Mono',monospace;font-size:12px;}

  .sr-only{
    position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;
    clip:rect(0,0,0,0);white-space:nowrap;border:0;
  }
.login-wrap{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    padding:24px;
  }
  .login-card{
    width:100%;max-width:420px;
    background:var(--paper-card);border:1px solid var(--line);border-radius:var(--radius);
    padding:32px 30px;box-shadow:var(--shadow);
  }
  .login-card .cover-eyebrow{margin-bottom:14px;}
  .login-card h1{font-size:26px;font-weight:500;margin:0 0 8px;}
  .login-card p{font-size:14px;color:var(--ink-soft);margin:0 0 20px;line-height:1.6;}
  .login-card label{
    display:block;font-family:'IBM Plex Mono',monospace;font-size:11px;
    text-transform:uppercase;letter-spacing:0.06em;color:var(--brass-dark);margin-bottom:6px;
  }
  .login-card input[type=email]{
    width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:6px;
    font-size:14px;font-family:'Inter';margin-bottom:14px;background:#fff;color:var(--ink);
  }
  .login-card input:focus{outline:2px solid var(--brass-light);border-color:var(--brass);}
  .login-card .begin-btn{width:100%;justify-content:center;}
  .login-msg{font-size:13.5px;color:var(--forest);margin-top:14px;line-height:1.5;}
  .login-error{font-size:13.5px;color:var(--rust);margin-top:14px;line-height:1.5;}
  .login-toggle{
    background:none;border:none;color:var(--brass-dark);font-size:13px;
    margin-top:16px;text-decoration:underline;padding:0;
  }

  .user-info{
    display:flex;justify-content:space-between;align-items:center;
    margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid rgba(255,255,255,0.1);
  }
  .user-email{font-size:12px;color:#C9CEDE;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:160px;}
  .signout-btn{
    background:none;border:1px solid rgba(255,255,255,0.25);color:#EDE8DA;
    font-size:11px;padding:5px 9px;border-radius:5px;flex:none;
  }
  .signout-btn:hover{border-color:var(--brass);}

  .thanks-banner{
    display:flex;align-items:center;gap:10px;
    background:var(--forest-light);border:1px solid var(--forest);color:#25452F;
    border-radius:8px;padding:12px 16px;margin:0 0 20px;font-size:13.5px;
  }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
// ---------- Supabase config ----------
// Replace these two values with your own project's URL and public anon key.
// Both are safe to expose in client-side code — see SETUP.md.
const SUPABASE_URL = "https://YOUR-PROJECT-REF.supabase.co";
const SUPABASE_ANON_KEY = "YOUR-ANON-PUBLIC-KEY";

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const MODULES = [
  {
    id:'why', num:'01', title:'Why this matters', eyebrow:'Orientation',
    dek:'Most of a leader\u2019s day goes to keeping up. This module reframes what Copilot Premium is actually for.',
    body:`
      <p>Your inbox, your meetings, and your documents already hold more than you can read. Copilot Premium does the reading, drafting, and prep so your time goes to judgment, direction, and the people who need you. Think of it less as a chatbot and more as a chief of staff who happens to live inside Outlook, Word, Excel, PowerPoint, and Teams.</p>
      <p>The distinction that matters most: Premium works from <strong>your actual work</strong>, not the public web. It reads across your email, meetings, documents, and calendar, inside your company's own security boundary. That's the difference between a tool that sounds smart and one that actually knows what's going on in your organization.</p>
      <div class="fact-grid">
        <div class="card"><h3>It knows your work</h3><p>Ask about a thread, a customer, a project, or a document by name and Copilot reads across your Microsoft 365 content to answer.</p></div>
        <div class="card"><h3>It works where you work</h3><p>Built into the apps you already use, plus one Copilot Chat front door. No new tool to learn.</p></div>
        <div class="card"><h3>It sounds like you</h3><p>Set it up once and it drafts in your voice, so less of what it produces needs a rewrite.</p></div>
        <div class="card"><h3>It stays private</h3><p>Your prompts and data stay inside your tenant, under enterprise protection.</p></div>
      </div>`,
    quiz:{
      q:'What actually separates Copilot Premium from a general AI chatbot?',
      options:['It has a nicer interface','It reads your own Microsoft 365 content inside your tenant, not the open web','It is only available on mobile'],
      correct:1,
      explain:'Premium\u2019s edge is grounding: it answers from your real email, files, and meetings inside your company\u2019s security boundary, rather than general web knowledge.'
    }
  },
  {
    id:'safety', num:'02', title:'Is my data safe?', eyebrow:'Trust and governance',
    dek:'The question every leader should ask before typing a single prompt \u2014 answered plainly.',
    body:`
      <p>This is worth settling early, because hesitation here is the biggest reason adoption stalls. The short version: Copilot works on your real work, not the open internet, and that work never leaves your tenant.</p>
      <ul>
        <li><strong>Your data stays in your tenant.</strong> Copilot Premium runs inside your Microsoft 365 boundary, protected by the same enterprise encryption and access controls as the rest of your data.</li>
        <li><strong>It doesn't train public models.</strong> Your prompts, documents, and Copilot's responses are never used to train the foundation models behind it.</li>
        <li><strong>It only sees what you can see.</strong> Copilot respects your existing permissions. It can't surface a file you don't already have access to.</li>
        <li><strong>You have controls and an audit trail.</strong> Microsoft Purview gives IT and compliance visibility, data-loss-prevention policies, and audit logs across Copilot activity.</li>
      </ul>
      <div class="card"><h3>For regulated industries</h3><p>If you operate under HIPAA or a similar framework, ask your IT team about what changes when web search is involved and what your BAA does and doesn't cover \u2014 it's a distinct question from tenant security.</p></div>`,
    quiz:{
      q:'True or false: Copilot can surface a file you don\u2019t already have permission to open.',
      options:['True','False'],
      correct:1,
      explain:'Copilot strictly respects existing permissions \u2014 it never grants access beyond what you already have.'
    }
  },
  {
    id:'find', num:'03', title:'Where to find Copilot', eyebrow:'Getting oriented',
    dek:'The most common reason new users stall isn\u2019t the tool \u2014 it\u2019s that they can\u2019t find the door in.',
    body:`
      <p>There are four doors into Copilot Premium, and you'll likely settle into one or two as habits.</p>
      <div class="fact-grid">
        <div class="card"><h3>The Copilot app</h3><p>Your front door. Open the icon in Teams, on your taskbar, or go to m365.cloud.microsoft. Ask it anything about your work.</p></div>
        <div class="card"><h3>Inside each app</h3><p>Look for the Copilot button in the ribbon of Outlook, Word, Excel, and PowerPoint. It works on the document in front of you.</p></div>
        <div class="card"><h3>In your meetings</h3><p>In Teams meetings, Copilot can recap what was said, list decisions, and pull action items \u2014 even if you joined late.</p></div>
        <div class="card"><h3>On your phone</h3><p>The Microsoft 365 Copilot mobile app puts the same assistant in your pocket for between-meeting moments.</p></div>
      </div>
      <p>The fastest-growing habit among executives isn't typing \u2014 it's talking. Open the app on your phone, tap the voice button, and ask out loud between meetings or in the car.</p>
      <div class="prompt-box">
        <span class="label">Try it \u2014 out loud, on mobile</span>
        <p>"What are my three most important emails today, and what does each one need from me?"</p>
        <button class="copy-btn" data-copy="What are my three most important emails today, and what does each one need from me?">Copy</button>
      </div>
      <div class="prompt-box">
        <span class="label">Try it \u2014 out loud, on mobile</span>
        <p>"Catch me up on my Teams chats from this afternoon. What did I miss and what needs a reply?"</p>
        <button class="copy-btn" data-copy="Catch me up on my Teams chats from this afternoon. What did I miss and what needs a reply?">Copy</button>
      </div>`,
    quiz:{
      q:'Where are executives increasingly getting the most value from Copilot Premium?',
      options:['Voice mode on the mobile app','Only inside PowerPoint','Through a browser extension'],
      correct:0,
      explain:'Talking to Copilot on mobile \u2014 between meetings or in the car \u2014 is the fastest-growing usage pattern among executives.'
    }
  },
  {
    id:'firstwin', num:'04', title:'Your first 5-minute win', eyebrow:'Hands-on start',
    dek:'Don\u2019t try to learn Copilot. Give it one job today, and you\u2019ll have a useful answer in under a minute.',
    body:`
      <p>Open the Copilot app and try one of these. Swap in real names from your world \u2014 a colleague, a project, a topic \u2014 and see what comes back.</p>
      <div class="prompt-box">

let currentId = null;
let completed = new Set();
let session = null;
let thanked = false;

function isConfigured(){
  return !SUPABASE_URL.includes('YOUR-PROJECT') && !SUPABASE_ANON_KEY.includes('YOUR-ANON');
}

// ---------- Progress (Supabase) ----------
async function loadProgress(){
  if(!session) return;
  const { data, error } = await sb
    .from('progress')
    .select('completed_modules, thanked_at')
    .eq('user_id', session.user.id)
    .maybeSingle();

  if(!data){
    await sb.from('progress').insert({
      user_id: session.user.id,
      email: session.user.email,
      completed_modules: []
    });
    completed = new Set();
    thanked = false;
    return;
  }
  completed = new Set(data.completed_modules || []);
  thanked = !!data.thanked_at;
}

async function saveProgress(){
  if(!session) return;
  await sb.from('progress').update({
    completed_modules: Array.from(completed),
    updated_at: new Date().toISOString()
  }).eq('user_id', session.user.id);
}

async function sendThankYouIfComplete(){
  if(thanked || completed.size !== MODULES.length || !session) return;
  try{
    await fetch(`${SUPABASE_URL}/functions/v1/send-thank-you`, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${session.access_token}`,
        'Content-Type': 'application/json'
      }
    });
    thanked = true;
  }catch(e){ /* non-fatal — the flow still works without the email */ }
}

// ---------- Auth views ----------
function renderLogin(mode){
  mode = mode || 'send';
  const root = document.getElementById('root');
  root.innerHTML = `
    <div class="login-wrap">
      <div class="login-card">
        <div class="cover-eyebrow">The Copilot Briefing</div>
        <h1>Sign in to begin</h1>
        <p>Enter your email and we'll send you a one-time sign-in link. No password to remember — your progress is saved to your account so you can pick up where you left off, any day, any device.</p>
        <label for="login-email">Email</label>
        <input type="email" id="login-email" placeholder="you@company.com" autocomplete="email">
        <button class="begin-btn" id="login-btn">Send sign-in link &rarr;</button>
        <div id="login-status"></div>
      </div>
    </div>`;

  document.getElementById('login-btn').addEventListener('click', async ()=>{
    const email = document.getElementById('login-email').value.trim();
    const status = document.getElementById('login-status');
    if(!email || !email.includes('@')){
      status.innerHTML = `<p class="login-error">Enter a valid email address.</p>`;
      return;
    }
    if(!isConfigured()){
      status.innerHTML = `<p class="login-error">This deployment hasn't been connected to a Supabase project yet — see SETUP.md.</p>`;
      return;
    }
    const btn = document.getElementById('login-btn');
    btn.disabled = true;
    btn.textContent = 'Sending…';
    const { error } = await sb.auth.signInWithOtp({
      email,
      options: { emailRedirectTo: window.location.href }
    });
    btn.disabled = false;
    btn.textContent = 'Send sign-in link \u2192';
    if(error){
      status.innerHTML = `<p class="login-error">${error.message}</p>`;
    }else{
      status.innerHTML = `<p class="login-msg">Check your inbox for a sign-in link. It'll bring you right back here, signed in.</p>`;
    }
  });
}

async function signOut(){
  await sb.auth.signOut();
  session = null;
  completed = new Set();
  renderLogin();
}

function renderModule(mod){
  currentId = mod.id;
  const idx = MODULES.findIndex(m=>m.id===mod.id);
  const prev = MODULES[idx-1];
  const next = MODULES[idx+1];
  const isDone = completed.has(mod.id);

  const main = document.getElementById('main');
  main.innerHTML = `
    <h2 class="sr-only">${mod.title} \u2014 module ${mod.num} of the Copilot Briefing course</h2>
    <div class="mod-eyebrow"><span>${mod.eyebrow}</span><span>&middot;</span><span>Briefing ${mod.num} of ${MODULES.length}</span></div>
    <div class="mod-header">
      <h2>${mod.title}</h2>
      <p class="mod-dek">${mod.dek}</p>
    </div>
    <div class="mod-body">${mod.body}</div>
    ${mod.quiz ? renderQuiz(mod.quiz) : ''}
    <div class="mod-footer">
      <div class="foot-nav">
        <button class="btn" id="prev-btn" ${prev? '' : 'disabled'}>&larr; Previous</button>
        <button class="btn" id="next-btn" ${next? '' : 'disabled'}>Next &rarr;</button>
      </div>
      <button class="btn btn-complete ${isDone?'is-done':''}" id="complete-btn">
        <span class="stamp-mark">${isDone ? '&#10003;' : ''}</span>
        <span>${isDone ? 'Marked complete' : 'Mark complete'}</span>
      </button>
    </div>`;

  if(prev) document.getElementById('prev-btn').addEventListener('click', ()=> goTo(prev.id));
  if(next) document.getElementById('next-btn').addEventListener('click', ()=> goTo(next.id));
  document.getElementById('complete-btn').addEventListener('click', async ()=>{
    completed.add(mod.id);
    await saveProgress();
    renderNav();
    renderModule(mod);
    if(mod.quiz) wireQuiz(mod);
    if(completed.size === MODULES.length){
      await sendThankYouIfComplete();
      setTimeout(()=> renderCompletion(), 350);
    }else if(next){
      setTimeout(()=> goTo(next.id), 350);
    }
  });

  wireCopyButtons(main);
  if(mod.id === 'formula') wireBuilder();
  if(mod.quiz) wireQuiz(mod);

  window.scrollTo(0,0);
}

function renderQuiz(quiz){
  return `
    <div class="quiz">
      <div class="qhead"><span>&#128220;</span><span>Check yourself</span></div>
      <p class="qtext">${quiz.q}</p>
      <div id="quiz-opts">
        ${quiz.options.map((opt,i)=>`<button class="qopt" data-idx="${i}">${opt}</button>`).join('')}
      </div>
      <p class="qexplain" id="quiz-explain">${quiz.explain}</p>
    </div>`;
}

function wireQuiz(mod){
  const wrap = document.getElementById('quiz-opts');
  if(!wrap) return;
  wrap.querySelectorAll('.qopt').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const idx = Number(btn.dataset.idx);
      wrap.querySelectorAll('.qopt').forEach(b=> b.disabled = true);
      if(idx === mod.quiz.correct){
        btn.classList.add('correct');
      }else{
        btn.classList.add('wrong');
        wrap.querySelectorAll('.qopt')[mod.quiz.correct].classList.add('correct');
      }
      document.getElementById('quiz-explain').classList.add('show');
    });
  }, { once:false });
}

function wireCopyButtons(scope){
  scope.querySelectorAll('.copy-btn').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const text = btn.dataset.copy;
      try{
        await navigator.clipboard.writeText(text);
      }catch(e){
        const ta = document.createElement('textarea');
        ta.value = text; document.body.appendChild(ta); ta.select();
        try{ document.execCommand('copy'); }catch(err){}
        document.body.removeChild(ta);
      }
      btn.textContent = 'Copied';
      btn.classList.add('copied');
      setTimeout(()=>{ btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1600);
    });
  });
}

function wireBuilder(){
  const fields = ['b-goal','b-context','b-source','b-format'];
  const preview = document.getElementById('b-preview');
  function update(){
    const goal = document.getElementById('b-goal').value.trim();
    const context = document.getElementById('b-context').value.trim();
    const source = document.getElementById('b-source').value.trim();
    const format = document.getElementById('b-format').value.trim();
    const parts = [goal, context, source, format].filter(Boolean);
    preview.textContent = parts.length ? parts.join(', ') + '.' : 'Your assembled prompt will appear here as you type.';
  }
  fields.forEach(id=> document.getElementById(id).addEventListener('input', update));
}

        <h3>One last resource</h3>
        <p>Michael Goad, Copilot Solution Engineer at Microsoft, offers a live 45-minute working session for teams: setting up personalization, building a Chief of Staff agent, and getting each leader a first real win. Reach him at michaelgoad@microsoft.com.</p>
      </div>
      <ul class="resource-list">
        <li><span>Copilot Prompt Gallery</span><span>Browse prompts by role</span></li>
        <li><span>Copilot Personalization guide</span><span>Set your profile</span></li>
        <li><span>Copilot Memory</span><span>What's worth saving</span></li>
        <li><span>Copilot Governance</span><span>For IT and security</span></li>
      </ul>
      <div class="mod-footer" style="border-top:none;padding-top:26px;">
        <button class="btn" id="revisit-btn">Revisit any briefing &larr;</button>
      </div>
    </div>`;
  document.getElementById('revisit-btn').addEventListener('click', ()=> renderCover());
  window.scrollTo(0,0);
}

function goTo(id){
  const mod = MODULES.find(m=>m.id===id);
  if(!mod) return;
  renderModule(mod);
  renderNav();
}

// ---------- Init ----------
async function boot(){
  const { data } = await sb.auth.getSession();
  session = data.session;

  sb.auth.onAuthStateChange((_event, sess)=>{ session = sess; });

  if(!session){
    renderLogin();
    return;
  }

  renderAppShell();
  await loadProgress();
  if(completed.size === MODULES.length){
    renderNav();
    renderCompletion();
  }else{
    renderCover();
  }
}

if(!isConfigured()){
  renderLogin();
}else{
  boot();
}

</script>
